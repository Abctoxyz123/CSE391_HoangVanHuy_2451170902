<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form đăng ký</title>
</head>
<body>
    <header>

    </header>
    <main>
        <form action="#" method="post">
            <fieldset>
                <legend>Thông tin cá nhân</legend>
                <label for="name">Họ tên</label>
                <input type="text" id="name" name="name" required minlength="2" maxlength="50" placeholder="Nhập họ và tên">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="example@gmail.com">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="tel" pattern="[0-9]{10}" placeholder="0123456789">
                <label for="birthday">Ngày sinh</label>
                <input type="date" id="birthday" max="2026-04-25" >
            </fieldset>
            <fieldset>
                <legend>Tài khoản</legend>
                <label for="username">Username</label>
                <input type="text" id="username" name="username" pattern="^[0-9a-zA-Z_]{3,20}$" placeholder="Chữ cái,số,underscore" title="3-20 ký tự, chỉ gồm chữ, số và dấu gạch dưới">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Ít nhất 8 ký tự, 1 chữ hoa, 1 chữ số">
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Nhập lại mật khẩu">
            </fieldset>
            <fieldset>
                <legend>Thông tin giao hàng</legend>
                <label for="city">Thành phố</label>
                <select name="city" id="city">
                    <option value="hanoi">Hà Nội</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="nghean">Nghệ An</option>
                </select>
                <label for="district">Quận/Huyện</label>
                <select name="district" id="district">
                    <option value="dongda">Đống Đa</option>
                </select>
                <label for="address">Địa chỉ chi tiết</label>
                <textarea name="address" id="address" rows="3" placeholder="Số nhà, tên đường ..."></textarea>
                <div>
                    <label for="gender">Giới tính</label>
                    <input type="radio" id="male" name="gender" checked="true">
                    <label for="male">Nam</label>
                    <input type="radio" id="female" name="gender">
                    <label for="female">Nữ</label>
                    <input type="radio" id="other" name="gender">
                    <label for="other">Khác</label>
                </div>
            </fieldset>
            <input type="checkbox" id="terms" required>
            <label for="terms">Tôi đồng ý với điều khoản dịch vụ</label>
            <br>
            <button type="submit">Đăng ký</button>
            <button type="reset">Nhập lại</button>
        </form>
    </main>
</body>
</html>
