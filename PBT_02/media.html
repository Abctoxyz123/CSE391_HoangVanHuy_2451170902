<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu sản phẩm</title>
</head>
<body>
    <section>
        <svg width="100" height="100" viewBox="0 0 100 100">
            <rect x="10" y="10" width="80" height="80" fill="skyblue" />
            <circle cx="50" cy="50" r="30" fill="white" />
            <text x="35" y="55" font-family="Arial" font-size="12" fill="black">LOGO</text>
        </svg>
    </section>
    <section>
        <h2>Danh sách sản phẩm</h2>
        <figure>
            <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/i/p/iphone-17-pro-max_3.jpg" 
                 alt="điện thoại iphone 17 promax"
                 width="200"
                 style="max-width: 100%; height: auto;">

            <figcaption>Sản phẩm điện thoại iPhone 17 Promax</figcaption>
        </figure>
        <figure>
            <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/s/a/samsung-galaxy-s26-ultra-12.jpg" 
                 alt="điện thoại samsung s26ultra"
                 width="200"
                 loading="lazy"
                 style="max-width: 100%; height: auto;">
            <figcaption>Sản phẩm điện thoại Samsung S26 Ultra</figcaption>
        </figure>
        <figure>
            <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/h/o/ho_1.png"
                 alt="laptop Macbook Neo 13inch A18 Pro"
                 width="220"
                 loading="lazy"
                 style="max-width: 100%; height: auto;">
            <figcaption>Sản phẩm laptop Macbook Neo 13 inch A18 Pro</figcaption>
        </figure>
    </section>
    <hr>
    <section>
        <h2>Video đánh giá sẳn phẩm</h2>
        <iframe width="560" height="315"
                src="https://www.youtube.com/embed/O9bXJC7E9Xc?si=zUNmWuYSp2L5YvDo"
                title="YouTube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen>
        </iframe>
    </section>
    <hr>
    <section>
        <h2>Đánh giá chi tiết</h2>
        <video width="560px" controls>
            <source src="./media/Tính năng chống nhìn trộm - Samsung Galaxy S26 Ultra.mp4" type="video/mp4">
            <source src="./media/Tính năng chống nhìn trộm - Samsung Galaxy S26 Ultra.webm năng chống nhìn trộm - Samsung Galaxy S26 Ultra.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
    </section>
    <hr>
    <section>
        <h2>Nhạc nền giới thiệu</h2>
        <audio controls>
            <source src="./media/nhạc nền giới thiệu.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ thẻ audio
        </audio>
    </section>
</body>
</html>
