<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="container">
        <header class="header">HEADER</header>

        <section class="hero">HERO BANNER</section>

        <main class="main-container">

            <aside class="sidebar">
                <h3>Filter</h3>
                <label><input type="checkbox">Điện thoại</label>
                <label><input type="checkbox">Laptop</label>
                <label><input type="checkbox">Phụ kiện</label>
            </aside>
            
            
            <div class="product-grid">
                <div class="card">Product 1</div>
                <div class="card">Product 2</div>
                <div class="card">Product 2</div>
                <div class="card">Product 2</div>
                <div class="card">Product 2</div>
                <div class="card">Product 2</div>
            </div>
            
            
            <aside class="ads">
                <h3>ADS</h3>
                <img src="" alt="">
            </aside>
        </main>

        <footer class="footer">FOOTER</footer>
    </div>
</body>
</html>
