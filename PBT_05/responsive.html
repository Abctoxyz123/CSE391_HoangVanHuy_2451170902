<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive product page</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <h1>LOGO</h1>
        </div>
        <button class="menu">☰</button>
        <nav class="navbar">
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <aside class="filter">
                <h3>Bộ lọc</h3>
                <label for="">
                    Danh mục
                    <select>
                        <option>Điện thoại</option>
                        <option>Laptop</option>
                        <option>Phụ kiện</option>
                    </select>
                </label>
            </aside>
            <div class="main-content">
                <div class="card card1">card 1</div>
                <div class="card card2">card 2</div>
                <div class="card card3">card 3</div>
                <div class="card card4">card 4</div>
            </div>
            <aside class="ads-bar">
                <h3>quảng cáo</h3>
            </aside>
        </div>
    </main>
    <footer class="footer">
        <p>footer</p>
    </footer>

</body>
</html>
